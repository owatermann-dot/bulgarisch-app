<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0914" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bulgarisch" />
  <meta name="description" content="Lerne Bulgarisch mit Sätzen, Gesprächen und Zahlen" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <title>Bulgarisch Lern-App</title>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:  #A855F7;
      --bg:       #0A0914;
      --card:     #13112A;
      --cardl:    #1C1938;
      --cardd:    #0E0C1F;
      --rose:     #FF6B6B;
      --gold:     #FFD166;
      --teal:     #06D6A0;
      --purple:   #A855F7;
      --blue:     #38BDF8;
      --text:     #F0ECFF;
      --muted:    #6B6880;
      --border:   #252240;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      font-size: 17px;
    }
    button { font-family: inherit; cursor: pointer; }
    textarea, input { font-family: inherit; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    input:focus, textarea:focus { outline: none; border-color: var(--purple) !important; }
    /* ── Onboarding & Profile System ── */
    #onboarding-overlay, #profile-overlay {
      position:fixed; inset:0; background:var(--bg);
      display:none; flex-direction:column;
      max-width:430px; margin:0 auto; z-index:500;
    }
    #onboarding-overlay.active, #profile-overlay.active { display:flex; }
    .ob-progress { height:4px; background:var(--cardl); flex-shrink:0; }
    .ob-fill { height:100%; border-radius:2px; transition:width 0.4s ease; }
    .ob-screen { flex:1; overflow-y:auto; display:none; flex-direction:column; padding:28px 22px; gap:18px; }
    .ob-screen.active { display:flex; }
    .ob-center { align-items:center; justify-content:center; text-align:center; }
    .emoji-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .emoji-btn { width:52px; height:52px; border-radius:14px; font-size:26px; cursor:pointer; transition:all 0.15s; border:2px solid var(--border); background:var(--card); }
    .emoji-btn.selected { transform:scale(1.15); }
    .theme-btn { display:flex; align-items:center; gap:14px; border-radius:16px; padding:12px 16px; cursor:pointer; transition:all 0.2s; border:2px solid var(--border); background:var(--card); width:100%; }
    .theme-circle { width:40px; height:40px; border-radius:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border:2px solid transparent; }
    .goal-btn { display:flex; align-items:center; gap:14px; border-radius:16px; padding:14px 16px; cursor:pointer; transition:all 0.2s; border:2px solid var(--border); background:var(--card); width:100%; }
    .profile-card-big { border-radius:28px; padding:28px; display:flex; flex-direction:column; align-items:center; gap:14px; }
    .avatar-big { width:80px; height:80px; border-radius:40px; font-size:42px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .profile-selector-card { border-radius:20px; overflow:hidden; margin-bottom:12px; }
    .profile-selector-btn { width:100%; background:none; border:none; cursor:pointer; padding:16px 18px; display:flex; align-items:center; gap:14px; text-align:left; }
    .avatar-mid { width:56px; height:56px; border-radius:28px; font-size:30px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .add-profile-btn { background:none; border:2px dashed var(--border); border-radius:20px; padding:18px; color:var(--muted); font-size:14px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; width:100%; font-family:inherit; }


    /* ── App Shell ── */
    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
    }

    /* ── Status bar spacer (iOS) ── */
    #statusbar {
      height: 44px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 22px;
      background: var(--bg);
    }
    #statusbar .time { font-size: 13px; font-weight: 700; color: var(--text); }
    #statusbar .pill { width: 90px; height: 10px; background: var(--card); border-radius: 8px; }
    #statusbar .icons { font-size: 12px; color: var(--text); }

    /* ── Screen container ── */
    #screen-container {
      flex: 1; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .screen {
      flex: 1; overflow-y: auto;
      display: none; flex-direction: column;
      padding: 0 16px 16px;
      -webkit-overflow-scrolling: touch;
    }
    .screen.active { display: flex; }

    /* ── Bottom navigation ── */
    #nav {
      flex-shrink: 0;
      display: flex;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 6px 0 14px;
    }
    .nav-btn {
      flex: 1; background: none; border: none;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 4px 0; position: relative;
    }
    .nav-btn .nav-icon { font-size: 20px; }
    .nav-btn .nav-label {
      font-size: 9px; font-weight: 800; letter-spacing: 0.4px;
      color: var(--muted); text-transform: uppercase;
    }
    .nav-btn.active .nav-label { color: var(--primary, var(--gold)); }
    .nav-btn .nav-bar {
      width: 18px; height: 2.5px;
      background: var(--primary, var(--gold)); border-radius: 2px;
      display: none;
    }
    .nav-btn.active .nav-bar { display: block; }
    .nav-badge {
      position: absolute; top: 0; right: 18%;
      background: var(--rose); border-radius: 8px;
      min-width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 900; color: white; padding: 0 3px;
    }

    /* ── Cards & common elements ── */
    .card {
      background: var(--card); border-radius: 18px;
      border: 1px solid var(--border); padding: 14px 16px;
    }
    .card-deep {
      background: var(--cardd); border-radius: 14px;
      border: 1px solid var(--border); padding: 12px 14px;
    }
    .label {
      font-size: 10px; font-weight: 800; letter-spacing: 1px;
      color: var(--muted); text-transform: uppercase; margin-bottom: 4px;
    }
    .btn-primary {
      width: 100%; border: none; border-radius: 18px; padding: 15px;
      color: white; font-size: 15px; font-weight: 900;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary));
    }
    .btn-theme {
      background: linear-gradient(135deg, var(--primary), var(--primary)cc);
      border: none; border-radius: 14px; padding: 12px 18px;
      color: white; font-size: 13px; font-weight: 900;
      cursor: pointer; font-family: inherit;
    }
    .btn-theme:disabled { opacity: 0.4; cursor: not-allowed; }
    .mode-btn.active {
      background: var(--primary-tint, rgba(168,85,247,0.22)) !important;
      border-color: var(--primary) !important; color: var(--primary) !important;
    }
    #btn-perfekt {
      background: var(--primary-tint, rgba(168,85,247,0.22)) !important;
      border-color: var(--primary) !important; color: var(--primary) !important;
    }
    .nav-btn.active .nav-label { color: var(--primary) !important; }
    .nav-btn.active .nav-bar   { background: var(--primary) !important; }
    .btn-secondary {
      background: var(--cardl); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 16px;
      color: var(--muted); font-size: 12px; font-weight: 800;
    }
    .chip {
      display: inline-block; padding: 3px 9px; border-radius: 10px;
      font-size: 10px; font-weight: 800;
    }
    .row { display: flex; gap: 8px; align-items: center; }
    .col { display: flex; flex-direction: column; gap: 8px; }

    /* ── Progress bar ── */
    .prog-track {
      background: rgba(255,255,255,0.08); border-radius: 6px; height: 7px;
    }
    .prog-fill {
      height: 100%; border-radius: 6px;
      transition: width 1s ease;
    }

    /* ── Dot rows ── */
    .dots-row {
      display: flex; gap: 3px;
    }
    .dot {
      flex: 1; height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.1);
      transition: background 0.25s;
    }

    /* ── Modals ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 24px;
    }
    .modal-backdrop.open { display: flex; }
    .modal-sheet {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--card); border-radius: 22px 22px 0 0;
      padding: 18px 18px 32px;
      border: 1px solid var(--border);
      display: none; z-index: 200;
    }
    .modal-sheet.open { display: block; animation: slideUp 0.3s ease; }
    .modal-card {
      background: var(--card); border-radius: 28px; padding: 28px;
      width: 100%; max-width: 320px; text-align: center;
    }
    .modal-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 14px;
    }

    /* ── SRS phase dots (legend) ── */
    .phase-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── Animations ── */
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes pop {
      0%   { transform: scale(0.85); opacity: 0; }
      70%  { transform: scale(1.04); }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px rgba(255,209,102,0.2); }
      50%       { box-shadow: 0 0 22px rgba(255,209,102,0.45); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .anim-glow    { animation: glow 2.5s infinite; }
    .anim-float   { animation: float 2s ease-in-out infinite; }
    .anim-pulse   { animation: pulse 0.8s infinite; }
    .anim-pop     { animation: pop 0.35s ease; }
    .anim-fade    { animation: fadeIn 0.3s ease; }

    /* ── Install banner ── */
    #install-banner {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 32px); max-width: 400px;
      background: linear-gradient(135deg, var(--purple), #6366f1);
      border-radius: 16px; padding: 12px 16px;
      display: none; align-items: center; gap: 10px;
      z-index: 50; box-shadow: 0 8px 32px rgba(168,85,247,0.4);
    }
    #install-banner.show { display: flex; }
    #install-banner .ib-text { flex: 1; }
    #install-banner .ib-title { color: white; font-size: 13px; font-weight: 800; }
    #install-banner .ib-sub   { color: rgba(255,255,255,0.7); font-size: 11px; }
    #install-banner button    {
      background: white; border: none; border-radius: 10px;
      padding: 7px 12px; color: var(--purple);
      font-size: 11px; font-weight: 900; white-space: nowrap;
    }
    #install-banner .ib-close {
      background: none; border: none; color: rgba(255,255,255,0.6);
      font-size: 18px; padding: 0 4px;
    }

    /* ── Goodie modal ── */
    #goodie-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: none; align-items: center; justify-content: center;
      z-index: 150; padding: 24px;
    }
    #goodie-modal.open { display: flex; }
    #goodie-modal .gm-card {
      background: var(--card); border-radius: 28px; padding: 28px;
      width: 100%; max-width: 320px; text-align: center;
    }
    #goodie-modal .gm-dots { display: flex; justify-content: center; gap: 5px; margin-bottom: 14px; }
    #goodie-modal .gm-dot  { width: 7px; height: 7px; border-radius: 4px; }

    /* ── PIN modal ── */
    #pin-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center;
      z-index: 200; padding: 24px;
    }
    #pin-modal.open { display: flex; }
    #pin-modal .pm-card {
      background: var(--card); border-radius: 24px; padding: 28px;
      width: 300px; text-align: center;
      border: 1px solid var(--border);
    }
    .pin-inputs { display: flex; gap: 10px; justify-content: center; margin: 16px 0; }
    .pin-input {
      width: 48px; height: 52px;
      background: var(--cardd); border: 2px solid var(--border);
      border-radius: 12px; text-align: center;
      font-size: 20px; font-weight: 900; color: var(--text);
      transition: border-color 0.2s;
    }
    .pin-input:focus  { border-color: var(--purple); }
    .pin-input.filled { border-color: var(--purple); }

    /* ── Toasts ── */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--cardl); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 18px;
      color: var(--text); font-size: 13px; font-weight: 700;
      display: none; z-index: 300; white-space: nowrap;
      animation: fadeIn 0.3s ease;
    }
    #toast.show { display: block; }

    /* ── Home screen specifics ── */
    .level-card {
      background: linear-gradient(135deg, #1a0e3a, #0e1a3a);
      border-radius: 20px; padding: 16px;
      margin-bottom: 10px;
    }
    .stat-grid { display: flex; gap: 7px; margin-bottom: 10px; }
    .stat-cell {
      flex: 1; background: var(--card); border-radius: 14px;
      padding: 9px 6px; border: 1px solid var(--border); text-align: center;
    }
    .stat-val  { font-size: 18px; font-weight: 900; }
    .stat-lbl  { font-size: 10px; font-weight: 800; color: var(--muted);
                 text-transform: uppercase; margin-top: 1px; }
    .cefr-row {
      background: var(--card); border-radius: 11px;
      padding: 8px 12px; border: 1px solid var(--border);
      display: flex; align-items: center; gap: 9px; margin-bottom: 5px;
    }
    .cefr-circle {
      width: 30px; height: 30px; border-radius: 15px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 900;
      border: 2px solid var(--border);
    }

    /* ── Learn screen ── */
    .mode-toggle {
      display: flex; gap: 8px;
      padding: 8px 16px;
      background: var(--card); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .mode-btn {
      flex: 1; background: var(--cardl); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px;
      color: var(--muted); font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s;
    }
    /* mode-btn.active handled above */
    .srs-strip {
      background: var(--card); border-radius: 11px;
      padding: 7px 11px; border: 1px solid var(--border);
      display: flex; gap: 14px; flex-shrink: 0;
    }
    .srs-item .srs-k { font-size: 9px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
    .srs-item .srs-v { font-size: 13px; font-weight: 900; color: var(--gold); }

    /* ── Rating buttons ── */
    .rating-row { display: flex; gap: 7px; }
    .rating-btn {
      flex: 1; border: none; border-radius: 13px; padding: 11px 4px;
      font-size: 11px; font-weight: 800;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .rating-btn .rb-icon { font-size: 17px; }
    .rating-btn .rb-note { font-size: 9px; color: var(--muted); font-weight: 600; }

    /* ── Conversation ── */
    .topic-scroll {
      display: flex; gap: 5px; overflow-x: auto;
      padding-bottom: 2px; flex-shrink: 0;
    }
    .topic-scroll::-webkit-scrollbar { height: 0; }
    .topic-btn {
      border-radius: 16px; padding: 4px 11px; flex-shrink: 0;
      font-size: 11px; font-weight: 800; white-space: nowrap;
      border: 1px solid var(--border); background: var(--card);
      color: var(--muted);
    }
    .topic-btn.active { background: rgba(255,107,107,0.28); border-color: var(--rose); color: var(--rose); }
    .chat-bubble-app {
      background: var(--cardl); border-radius: 13px 13px 13px 3px;
      padding: 8px 11px; max-width: 230px;
      border: 1px solid var(--border);
    }
    .chat-bubble-user {
      background: linear-gradient(135deg, rgba(255,107,107,0.25), rgba(168,85,247,0.18));
      border-radius: 13px 13px 3px 13px; padding: 8px 11px;
      max-width: 220px; border: 1px solid rgba(255,107,107,0.33);
    }
    .chat-hint {
      background: rgba(255,209,102,0.06); border-radius: 11px; padding: 10px;
      border: 1px dashed rgba(255,209,102,0.44);
    }

    /* ── Map screen ── */
    .city-btn {
      border-radius: 18px; padding: 6px 12px;
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 800; border: none;
      transition: all 0.2s;
    }
    .city-btn.locked { opacity: 0.35; }
    .unlock-row {
      background: var(--card); border-radius: 11px; padding: 8px 12px;
      border: 1px solid var(--border); display: flex;
      align-items: center; gap: 9px; margin-bottom: 5px;
    }

    /* ── Admin screen ── */
    .admin-tab-btn {
      border-radius: 10px; padding: 4px 9px;
      font-size: 10px; font-weight: 800;
      background: var(--cardl); border: 1px solid var(--border);
      color: var(--muted);
    }
    .admin-tab-btn.active {
      background: rgba(168,85,247,0.28);
      border-color: var(--purple); color: var(--purple);
    }
    .topic-cluster {
      background: var(--card); border-radius: 16px;
      border: 1px solid var(--border); overflow: hidden;
      margin-bottom: 8px;
    }
    .topic-cluster.open { border-color: var(--purple); }
    .topic-header {
      width: 100%; background: none; border: none;
      padding: 12px 13px; display: flex; align-items: center; gap: 10px;
      text-align: left; cursor: pointer;
    }
    .topic-icon-box {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .sentence-row {
      background: var(--cardd); border-radius: 10px;
      border: 1px solid var(--border); margin-bottom: 6px;
    }
    .sentence-inner {
      display: flex; align-items: flex-start; gap: 7px; padding: 9px 10px;
    }
    .s-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 2px; }
    .s-badge {
      padding: 1px 5px; border-radius: 4px;
      font-size: 8px; font-weight: 800;
    }
    .s-actions { display: flex; gap: 3px; flex-shrink: 0; }
    .s-btn {
      border: none; border-radius: 6px; padding: 4px 6px;
      font-size: 11px; cursor: pointer;
    }
    .quota-bar {
      background: var(--cardd); border-radius: 9px; padding: 7px 10px;
      margin-bottom: 9px; display: flex; align-items: center; gap: 9px;
    }
    .add-btn {
      width: 100%; border-radius: 11px; padding: 9px;
      font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .audio-prog-row { margin-bottom: 8px; }
    .audio-prog-row .apr-header {
      display: flex; justify-content: space-between; margin-bottom: 3px;
    }
    .export-card {
      background: var(--card); border-radius: 16px; padding: 13px 14px;
      border: 1px solid var(--border); margin-bottom: 10px;
    }
    .import-format {
      background: var(--cardd); border-radius: 13px; padding: 11px 13px;
      border: 1px solid var(--border); margin-bottom: 12px;
    }
  </style>
</head>

<body>
<div id="app">

  <!-- ══ ONBOARDING OVERLAY ══ -->
  <div id="ob-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);
    flex-direction:column;max-width:430px;margin:0 auto;z-index:500;font-family:'Nunito',sans-serif">
    <!-- Progress bar -->
    <div style="height:4px;background:var(--cardl);flex-shrink:0">
      <div id="ob-progress" style="height:100%;border-radius:2px;width:0%;transition:width 0.4s ease,background 0.4s ease"></div>
    </div>
    <!-- Single content area — rendered by JS per step -->
    <div id="ob-content" style="flex:1;overflow-y:auto;padding:28px 22px 32px;display:flex;flex-direction:column;gap:18px"></div>
  </div>

  <!-- ══ PROFILE SELECTOR OVERLAY ══ -->

// SM-2
// ═══════════════════════════════════════════════════════════════
function createCard(id){
  return {id, interval:0, easeFactor:2.5, repetitions:0, nextDue:Date.now(), phase:'new', lastReviewed:null};
}
function sm2Update(card, quality){
  let {interval, easeFactor, repetitions} = card;
  if(quality>=3){
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*easeFactor);
    repetitions+=1;
  } else { repetitions=0; interval=1; }
  easeFactor=Math.max(1.3,Math.min(2.5, easeFactor+0.1-(5-quality)*(0.08+(5-quality)*0.02)));
  const nextDue=Date.now()+interval*DAY_MS;
  let phase=card.phase==='new'?'learning':card.phase;
  if(repetitions>=3&&interval>=7)  phase='review';
  if(repetitions>=6&&interval>=21) phase='mastered';
  return {...card, interval, easeFactor, repetitions, nextDue, phase, lastReviewed:Date.now()};
}
function isDue(card){ return Date.now()>=card.nextDue; }
function formatDue(ms){
  const d=ms-Date.now(); if(d<=0) return 'Jetzt';
  const h=Math.floor(d/3600000); if(h<24) return h+'h';
  return Math.floor(d/DAY_MS)+'d';
}

function pinInput(idx){
  const val=document.getElementById('pin'+idx).value.replace(/\D/,'');
  document.getElementById('pin'+idx).value=val;
  document.getElementById('pin'+idx).classList.toggle('filled',!!val);
  if(val&&idx<3){ document.getElementById('pin'+(idx+1)).focus(); return; }
  if(val&&idx===3){
    const entered=[0,1,2,3].map(i=>document.getElementById('pin'+i).value).join('');
    if(entered.length<4) return;
    if(state.pinMode==='set'){
      if(state.pinStep==='enter'){
        state.pinFirstEntry=entered;
        state.pinStep='confirm';
        document.getElementById('pm-title').textContent='PIN bestätigen';
        document.getElementById('pm-error').textContent='';
        clearPinInputs();
        setTimeout(()=>document.getElementById('pin0').focus(), 50);
      } else {
        if(entered===state.pinFirstEntry){
          state.adminPin=entered;
          state.pinUnlocked=true;
          LS.save('adminPin', state.adminPin);
          closePinModal();
          updatePinBadge();
          showToast('✅ PIN gesetzt!');
          if(state.pinCallback){ state.pinCallback(); state.pinCallback=null; }
        } else {
          document.getElementById('pm-error').textContent='PINs stimmen nicht überein';
          clearPinInputs();
          state.pinStep='enter';
          state.pinFirstEntry='';
          document.getElementById('pm-title').textContent='Neue PIN festlegen (4 Ziffern)';
          setTimeout(()=>document.getElementById('pin0').focus(), 50);
        }
      }
    } else {
      if(entered===state.adminPin){
        state.pinUnlocked=true;
        closePinModal();
        updatePinBadge();
        showToast('🔓 Entsperrt!');
        if(state.pinCallback){ state.pinCallback(); state.pinCallback=null; }

        setTimeout(()=>inputs.style.animation='', 400);

        setTimeout(()=>document.getElementById('pin0').focus(), 50);
      }
    }
  }

// HOME RENDER  — v3: profile-driven, fixed all Sprint-0 issues
// ═══════════════════════════════════════════════════════════════

// Lernpfad levels — 5 steps of 20% each
const LERNPFAD_LEVELS = [
  { id:"beginner",       label:"Beginner",        emoji:"🌱", minPct:0  },
  { id:"standard",       label:"Standard",         emoji:"📖", minPct:20 },
  { id:"fortgeschritten",label:"Fortgeschritten",  emoji:"⚡", minPct:40 },
  { id:"super",          label:"Super",            emoji:"🌟", minPct:60 },
  { id:"experte",        label:"Experte",          emoji:"🏆", minPct:80 },
];

function getPerfectCount() {
  // Only sentences rated 'Perfekt' (quality=5 → phase mastered via repetitions)
  // We track perfect via a separate counter per profile stored in state
  return Object.values(state.deck).filter(c => c.phase === 'mastered').length;
}

const LERNPFAD_BASE = 200; // always 200 original sentences = 100%

function getTotalSentences() {
  return getAllSentences().length; // includes teacher-added extras
}

function getLernpfadPct() {
  // Base is always 200 — teacher-added sentences are bonus beyond 100%
  return Math.min(100, Math.round((getPerfectCount() / LERNPFAD_BASE) * 100));
}

function getLernpfadLevel(pct) {
  let level = LERNPFAD_LEVELS[0];
  for (const l of LERNPFAD_LEVELS) { if (pct >= l.minPct) level = l; }
  return level;
}

function getNextLernpfadLevel(pct) {
  for (const l of LERNPFAD_LEVELS) { if (pct < l.minPct) return l; }
  return null;
}

// Daily target: dailyGoal minutes / 1.8 min per sentence, minimum 3
function getDailyTarget() {
  const goal = activeProfile?.dailyGoal || 10;
  return Math.max(3, Math.round(goal / 1.8));
}

// Sentences done today = cards reviewed today (any quality)
function getSentencesToday() {
  const today = new Date().toDateString();
  return Object.values(state.deck).filter(c =>
    c.lastReviewed && new Date(c.lastReviewed).toDateString() === today
  ).length;
}

// Queue: all sentences NOT yet mastered (phase !== 'mastered')
// New users see "Sätze lernen", returning users see "Sätze wiederholen"
function buildLearnQueue() {
  const all = getAllSentences();
  // Due reviews first, then new sentences
  return [
    ...all.filter(s => state.deck[s.id] && state.deck[s.id].phase !== 'new' &&
                       state.deck[s.id].phase !== 'mastered' && isDue(state.deck[s.id])),
    ...all.filter(s => state.deck[s.id] && state.deck[s.id].phase === 'new'),
  ];
}

function renderHome() {
  const perfect  = getPerfectCount();
  const total    = getTotalSentences();
  const pct      = getLernpfadPct();
  const level    = getLernpfadLevel(pct);
  const nextLevel= getNextLernpfadLevel(pct);
  const theme    = getTheme(activeProfile?.themeId || 'purple');
  const queue    = buildLearnQueue();
  const dueCount = queue.length;
  const dailyTarget  = getDailyTarget();
  const doneToday    = getSentencesToday();
  const todayPct = Math.min(100, Math.round((doneToday / dailyTarget) * 100));
  const isNewUser= perfect === 0 && Object.values(state.deck).every(c => c.phase === 'new');

// Track selected topic: null = all topics, string = topic id
if(!state.selectedTopicId) state.selectedTopicId = null;

function setLearnMode(mode){
  state.learnMode = mode;
  document.getElementById('mode-sentences').classList.toggle('active', mode==='sentences');
  document.getElementById('mode-numbers').classList.toggle('active', mode==='numbers');
  if(mode==='sentences'){
    // Always return to topic picker when switching to sentences
    showTopicPicker();
  } else {
    hideTopicPicker();
    renderNumbers();
  }
}

function showTopicPicker(){
  document.getElementById('topic-picker').style.display = 'block';
  document.getElementById('learn-content').style.display = 'none';
  renderTopicPicker();
}

function hideTopicPicker(){
  document.getElementById('topic-picker').style.display = 'none';
  document.getElementById('learn-content').style.display = 'flex';
}

function selectTopic(topicId){
  state.selectedTopicId = topicId;
  state.learnQIdx = 0;
  state.learnReps = 0;
  state.learnPhase = 'listen';
  state.learnShowBg = false;
  state.learnTranscript = '';
  hideTopicPicker();
  renderSentences();
}

function backToTopics(){
  state.selectedTopicId = null;
  showTopicPicker();
}

function getTopicSentences(topicId){
  if(!topicId) return getAllSentences();
  const topic = state.topics.find(t => t.id === topicId);
  if(!topic) return [];
  return topic.sentences.map(s => ({...s, unit: topic.name}));
}

function getTopicPerfectCount(topicId){
  const sentences = getTopicSentences(topicId);
  return sentences.filter(s => state.deck[s.id]?.phase === 'mastered').length;
}

function getTopicDueCount(topicId){
  const sentences = getTopicSentences(topicId);
  return sentences.filter(s => {
    const c = state.deck[s.id];
    return c && (c.phase === 'new' || ((c.phase === 'learning' || c.phase === 'review') && isDue(c)));
  }).length;
}

function buildQueue(){
  const all = getAllSentences();
  const target = getDailyTarget();
  // Due reviews (not mastered) first, then new sentences up to daily target
  const due = all.filter(s => {
    const c = state.deck[s.id];
    return c && c.phase !== 'new' && c.phase !== 'mastered' && isDue(c);
  });
  const newCards = all.filter(s => {
    const c = state.deck[s.id];
    return c && c.phase === 'new';
  }).slice(0, Math.max(0, target - due.length));
  return [...due, ...newCards];
}

function renderLearn(){
  if(state.learnMode==='sentences'){
    // Show topic picker unless a topic is already selected
    if(state.selectedTopicId !== null && state.selectedTopicId !== undefined){
      // Check if we were mid-session
      hideTopicPicker();
      renderSentences();
    } else {
      showTopicPicker();
    }
  } else {
    hideTopicPicker();
    renderNumbers();
  }
}

function learnPlay(){
  const current=state.learnQueue[state.learnQIdx%Math.max(1,state.learnQueue.length)];
  if(!current) return;
  speak(current.bg);
  state.learnShowBg=true;
  state.learnReps++;
  const isNew=state.deck[current.id]?.phase==='new';
  const repsTarget=isNew?LEARN_REPS:REVIEW_REPS;
  if(state.learnReps>=repsTarget) setTimeout(()=>{ state.learnPhase='speak'; renderSentences(); },900);
  else renderSentences();
}

function learnRecord(){
  const btn=document.getElementById('record-btn');
  if(!btn) return;
  btn.style.background='linear-gradient(135deg,#FF6B6B,#ff4757)';
  btn.innerHTML='<span style="font-size:20px">⏹</span>Zuhören...';
  btn.classList.add('anim-pulse');
  state.learnTranscript='';

  const SRE=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SRE){
    try{
      const r=new SRE(); r.lang='bg-BG'; r.interimResults=false; r.maxAlternatives=1;
      r.onresult=e=>{ state.learnTranscript=e.results[0][0].transcript; };
      r.onerror=()=>{ state.learnPhase='result'; renderSentences(); };
      r.onend=()=>{ state.learnPhase='result'; renderSentences(); };
      r.start();
      return;
    }catch(e){}
  }
  // Fallback: simulate after 2s
  setTimeout(()=>{ state.learnPhase='result'; renderSentences(); }, 2400);
}

function learnRate(quality){
  const current=state.learnQueue[state.learnQIdx%Math.max(1,state.learnQueue.length)];
  if(!current) return;
  let updated = sm2Update(state.deck[current.id], quality);
  // Only mark as mastered on explicit Perfekt rating (quality===5)
  if(quality < 5 && updated.phase === 'mastered') {
    updated = { ...updated, phase: 'review' }; // keep in review until Perfekt
  }
  state.deck[current.id] = updated;
  LS.save('deck', state.deck);
  if(quality===5 && Math.random()>0.45) showGoodie();
  state.learnQIdx++;
  state.learnReps=0;
  state.learnPhase='listen';
  state.learnShowBg=false;
  state.learnTranscript='';
  updateStreakBadge();
  saveAll();
  renderSentences();
  // Always update home counter so Perfekt shows immediately
  renderHome();
  // Check if a gift was just unlocked
  checkGiftUnlocks();
}

function pickNumber(){
  const group=NUM_GROUPS[state.numGroupIdx];
  let num;
  if(group.label==='Zufall'){ const k=Object.keys(BG_NUMBERS).map(Number); num=k[Math.floor(Math.random()*k.length)]; }
  else { num=group.nums[Math.floor(Math.random()*group.nums.length)]; }
  state.numCurrent=num; state.numShowBg=false; state.numResult=null; state.numInput='';
}
function setNumGroup(i){ state.numGroupIdx=i; pickNumber(); renderNumbers(); }
function setNumMode(m){ state.numMode=m; pickNumber(); renderNumbers(); }
function numListen(){ speak(BG_NUMBERS[state.numCurrent]); state.numShowBg=true; renderNumbers(); }
function numCheck(){
  const n=parseInt(state.numInput,10);
  const ok=n===state.numCurrent;
  state.numResult=ok?'correct':'wrong';
  state.numScore={correct:state.numScore.correct+(ok?1:0),total:state.numScore.total+1};
  state.numStreak=ok?state.numStreak+1:0;
  renderNumbers();
}
function numGuess(n){
  const ok=n===state.numCurrent;
  state.numResult=ok?'correct':'wrong';
  state.numScore={correct:state.numScore.correct+(ok?1:0),total:state.numScore.total+1};
  state.numStreak=ok?state.numStreak+1:0;
  renderNumbers();
  setTimeout(()=>{ pickNumber(); state.numResult=null; renderNumbers(); },900);
}
function numWrongOptions(correct,count){
  const all=Object.keys(BG_NUMBERS).map(Number).filter(n=>n!==correct);
  return all.sort(()=>Math.random()-0.5).slice(0,count);
}

function renderChat(){
  const topicKeys=Object.keys(CONVERSATIONS);

  // Topic scroll
  document.getElementById('topic-scroll').innerHTML=topicKeys.map(t=>
    `<button class="topic-btn ${t===state.chatTopic?'active':''}" onclick="setChatTopic('${t}')">${t}</button>`
  ).join('');

  renderChatMessages();
}

function setChatTopic(t){
  state.chatTopic=t; state.chatStep=0; state.chatAnswered=[];
  state.chatDone=false; state.chatShowHint=false;
  renderChat();
  const conv=CONVERSATIONS[t];
  if(conv[0]?.speaker==='app') setTimeout(()=>speak(conv[0].bg),350);
}

function renderChatMessages(){
  const conv=CONVERSATIONS[state.chatTopic];
  const current=conv[state.chatStep];
  const msgEl=document.getElementById('chat-messages');
  const promptEl=document.getElementById('chat-user-prompt');
  const ctrlEl=document.getElementById('chat-controls');

  let html='';
  conv.forEach((msg,i)=>{
    if(msg.speaker==='app'&&i<=state.chatStep){
      html+=`<div style="display:flex;gap:8px;align-items:flex-end" class="anim-fade">
        <div style="width:32px;height:32px;border-radius:16px;flex-shrink:0;background:linear-gradient(135deg,var(--purple),var(--rose));display:flex;align-items:center;justify-content:center;font-size:15px">🦋</div>
        <div>
          <div class="chat-bubble-app">
            <div style="color:var(--text);font-size:14px;font-weight:700">${msg.bg}</div>
            <div style="color:var(--muted);font-size:11px;margin-top:2px">${msg.de}</div>
          </div>
          <button onclick="speak('${msg.bg.replace(/'/g,"\\'")}',0.82)" style="background:none;border:none;color:var(--purple);font-size:10px;font-weight:700;margin-top:2px;margin-left:3px;cursor:pointer">🔊</button>
        </div>
      </div>`;
    }
    const ua=state.chatAnswered.find(a=>a.step===i);
    if(msg.speaker==='user'&&ua){
      html+=`<div style="display:flex;justify-content:flex-end" class="anim-fade">
        <div class="chat-bubble-user">
          <div style="color:var(--text);font-size:13px;font-weight:700">${ua.text}</div>
        </div>
      </div>`;
    }
  });
  msgEl.innerHTML=html;
  msgEl.scrollTop=msgEl.scrollHeight;

  if(!state.chatDone&&current?.speaker==='user'){
    promptEl.style.display='block';
    promptEl.innerHTML=`<div class="chat-hint">
      <div style="color:var(--gold);font-size:10px;font-weight:800;letter-spacing:1px">DEINE ANTWORT</div>
      <div style="color:var(--text);font-size:12px;margin-top:3px">${current.prompt}</div>
      ${state.chatShowHint?`<div style="color:var(--muted);font-size:12px;margin-top:5px;font-style:italic;background:rgba(255,255,255,0.05);border-radius:7px;padding:5px 8px">💡 ${current.hint}</div>`:''}
    </div>`;
    ctrlEl.style.display='flex'; ctrlEl.style.gap='7px';
    ctrlEl.innerHTML=`
      <button onclick="state.chatShowHint=!state.chatShowHint;renderChatMessages()" style="background:var(--cardl);border:1px solid var(--border);border-radius:11px;padding:9px 12px;color:var(--muted);font-size:14px">💡</button>
      <button onclick="chatRecord()" id="chat-record-btn" style="flex:1;border:none;border-radius:11px;padding:11px;background:linear-gradient(135deg,var(--teal),#00b894);color:white;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:7px">
        <span style="font-size:19px">🎤</span>Sprechen
      </button>`;
  } else if(state.chatDone){
    promptEl.style.display='none';
    ctrlEl.style.display='none';
    msgEl.innerHTML+=`<div class="card" style="text-align:center;background:rgba(6,214,160,0.15);border-color:rgba(6,214,160,0.44)" class="anim-pop">
      <div style="font-size:36px">🎉</div>
      <div style="color:var(--teal);font-size:14px;font-weight:900;margin-top:6px">Gespräch abgeschlossen!</div>
      <div style="color:var(--muted);font-size:12px;margin-top:2px">+50 XP · Sehr gut! 🌟</div>
      <button onclick="setChatTopic(state.chatTopic)" style="background:var(--teal);border:none;border-radius:10px;padding:8px 20px;color:var(--bg);font-size:12px;font-weight:900;margin-top:9px">Nochmal üben 🔄</button>
    </div>`;
    msgEl.scrollTop=msgEl.scrollHeight;
  } else {
    promptEl.style.display='none';
    ctrlEl.style.display='none';
  }
}

function chatRecord(){
  const btn=document.getElementById('chat-record-btn');
  if(btn){ btn.style.background='linear-gradient(135deg,#FF6B6B,#ff4757)'; btn.innerHTML='<span style="font-size:19px">⏹</span>Zuhören...'; }
  const conv=CONVERSATIONS[state.chatTopic];
  const current=conv[state.chatStep];
  setTimeout(()=>{
    state.chatAnswered.push({step:state.chatStep, text:current?.hint||'...'});
    setTimeout(()=>{
      if(state.chatStep+1<conv.length) state.chatStep++;
      else state.chatDone=true;
      if(!state.chatDone){
        const next=conv[state.chatStep];
        if(next?.speaker==='app') setTimeout(()=>speak(next.bg),350);
      }
      renderChatMessages();
    },700);
  },2000);
}

    const remaining=EXTRA_LIMIT-extras.length;

    const pct=Math.round(humanCount/Math.max(1,topic.sentences.length)*100);

    html+=`<div class="topic-cluster ${isOpen?'open':''}" style="border-color:${isOpen?topic.color+'55':'var(--border)'}">

function saveEdit(){
  const de=document.getElementById('edit-de').value.trim();
  const en=document.getElementById('edit-en').value.trim();
  const bg=document.getElementById('edit-bg').value.trim();
  if(!de||!bg){ showToast('⚠️ Deutsch und Bulgarisch sind Pflichtfelder'); return; }
  // Require PIN before committing the save
  requirePin(()=>{
    if(state.addToTopicId){
      const ns={id:newId(),de,en,bg,origin:'teacher'};
      state.topics=state.topics.map(t=>t.id===state.addToTopicId?{...t,sentences:[...t.sentences,ns]}:t);
      state.deck[ns.id]=createCard(ns.id);
      LS.save('topics',state.topics);
      LS.save('deck',state.deck);
      showToast('✅ Satz hinzugefügt!');
    } else if(state.editTarget){
      state.topics=state.topics.map(t=>({...t,sentences:t.sentences.map(s=>s.id===state.editTarget.id?{...s,de,en,bg}:s)}));
      LS.save('topics',state.topics);
      showToast('✅ Satz gespeichert!');
    }
    closeEditSheet();
    renderAdminSentences();
  });
}

function handleCSVImport(){

  requirePin(()=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const {newTopics,updatedCount,addedCount}=parseCSV(e.target.result);
        state.topics=newTopics;
        syncDeck();
        state.importResult={ok:true,updatedCount,addedCount};
      }catch(err){
        state.importResult={ok:false,error:String(err)};
      }
      saveAll();
      document.getElementById('csv-file-input').value='';
      renderAdminImport();
    };
    reader.readAsText(file,'utf-8');
  });
}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const hdr=lines[0].split(';').map(h=>h.replace(/^"|"$/g,'').toLowerCase().trim());
  const ci=n=>hdr.findIndex(h=>h.includes(n));
  const [iId,iThema,iDe,iEn,iBg,iTyp]=[ci('id'),ci('thema'),ci('deutsch'),ci('english'),ci('bulgar'),ci('typ')];
  const updates=[]; const additions=[];
  lines.slice(1).forEach(line=>{
    if(!line.trim()) return;
    const c=line.split(';').map(x=>x.replace(/^"|"$/g,'').trim());
    const [id,thema,de,en,bg,typ]=[c[iId],c[iThema]||'',c[iDe]||'',c[iEn]||'',c[iBg]||'',(c[iTyp]||'').toLowerCase()];
    if(!de||!bg) return;
    if(id&&!id.startsWith('+')&&!isNaN(id)) updates.push({id:Number(id),de,en,bg});
    else if(typ==='teacher'&&de&&bg){ const t=state.topics.find(t=>t.name===thema); if(t) additions.push({topicId:t.id,de,en,bg}); }
  });
  const newTopics=state.topics.map(t=>({...t,sentences:t.sentences.map(s=>{const u=updates.find(u=>u.id===s.id);return u?{...s,...u}:s;})}));
  additions.forEach(a=>{
    const ti=newTopics.findIndex(t=>t.id===a.topicId); if(ti<0) return;
    const ex=newTopics[ti].sentences.filter(s=>s.origin==='teacher');
    if(ex.length>=EXTRA_LIMIT) return;
    newTopics[ti]={...newTopics[ti],sentences:[...newTopics[ti].sentences,{id:newId(),de:a.de,en:a.en,bg:a.bg,origin:'teacher'}]};
  });
  return {newTopics,updatedCount:updates.length,addedCount:additions.length};
}

function exportCSV(topicId){
  const filtered=topicId?state.topics.filter(t=>t.id===topicId):state.topics;
  const rows=[['ID','Thema','Deutsch','English','Български','Typ']];
  filtered.forEach(t=>{
    t.sentences.forEach(s=>rows.push([s.id,t.name,s.de,s.en||'',s.bg,s.origin]));
    for(let i=1;i<=EXTRA_LIMIT;i++) rows.push([`+${i}`,t.name,'','','','teacher']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=topicId?`bulgarisch_${topicId}.csv`:'bulgarisch_alle.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('📊 CSV wird heruntergeladen...');
}

  const today=new Date().toDateString();
  if(state.streak.lastDate!==today){
    const yesterday=new Date(Date.now()-DAY_MS).toDateString();
    if(state.streak.lastDate===yesterday) state.streak.count++;

    LS.save('streak', state.streak);
  }
}

function getGifts() {
  return LS.load('gifts', { 1:{message:"",unlocked:false}, 2:{message:"",unlocked:false},
    3:{message:"",unlocked:false}, 4:{message:"",unlocked:false}, 5:{message:"",unlocked:false} });
}
function saveGifts(g) { LS.save('gifts', g); }

function checkGiftUnlocks() {
  const pct = getLernpfadPct();
  const gifts = getGifts();
  let changed = false;
  GIFT_LEVELS.forEach(gl => {
    if (pct >= gl.pct && !gifts[gl.step].unlocked) {
      gifts[gl.step].unlocked = true;
      changed = true;
      setTimeout(() => showGiftCelebration(gl), 600);
    }
  });
  if (changed) saveGifts(gifts);
}

function showGiftCelebration(gl) {
  const c = getTheme(activeProfile?.themeId || 'purple').primary;
  document.getElementById('gm-dots').innerHTML =
    ['#FF6B6B','#FFD166','#06D6A0','#A855F7','#38BDF8'].map((col,i) =>
      `<div class="gm-dot anim-float" style="background:${col};animation-delay:${i*0.18}s"></div>`
    ).join('');
  document.getElementById('gm-icon').textContent = gl.emoji;
  document.getElementById('gm-title').style.color = c;
  document.getElementById('gm-title').textContent = `Stufe ${gl.step} freigeschaltet! 🎉`;
  document.getElementById('gm-content').textContent = `Du hast ${gl.label} erreicht!\n\nFrag Papa nach deinem Erfolgs-Geschenk! 🎁`;
  document.getElementById('gm-btn').style.background = c;
  const card = document.querySelector('#goodie-modal .gm-card');
  if(card){ card.style.border=`2px solid ${c}44`; card.style.boxShadow=`0 0 60px ${c}44`; }
  document.getElementById('goodie-modal').classList.add('open');
}

// ═══════════════════════════════════════════════════════════════
// THEME APPLICATION
// ═══════════════════════════════════════════════════════════════

function applyTheme(themeId) {
  const t = getTheme(themeId);
  const r = document.documentElement.style;
  r.setProperty('--primary',       t.primary);
  r.setProperty('--primary-tint',  t.primary + '33');
  r.setProperty('--primary-muted', t.primary + 'cc');
  r.setProperty('--primary-glow',  t.primary + '44');
  r.setProperty('--theme-glow',    t.primary + '22');
  r.setProperty('--theme-border',  t.primary + '44');
  // Update nav active indicators
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const active = btn.classList.contains('active');
    const lbl = btn.querySelector('.nav-label');
    const bar = btn.querySelector('.nav-bar');
    if (lbl) lbl.style.color      = active ? t.primary : '';
    if (bar) bar.style.background = active ? t.primary : '';
  });
}

// ═══════════════════════════════════════════════════════════════
// PROFILE DATA HELPERS
// ═══════════════════════════════════════════════════════════════

const MAX_PROFILES = 4;
let activeProfile  = null;

function loadProfiles()    { return LS.load('profiles', []); }
function saveProfiles(arr) { LS.save('profiles', arr); }

function createProfile(data) {
  return {
    id:        Date.now().toString(),
    name:      data.name.trim(),
    emoji:     data.emoji,
    themeId:   data.themeId,
    dailyGoal: data.dailyGoal,
    streak:    0,
    lastDate:  null,
    createdAt: Date.now(),
  };
}

function persistProfile(updated) {
  // Save an updated profile object, keep rest unchanged
  const profiles = loadProfiles().map(p =>
    p.id === updated.id ? { ...p, ...updated } : p
  );
  saveProfiles(profiles);
  activeProfile = { ...activeProfile, ...updated };
  LS.save('activeProfileId', activeProfile.id);
}

// ═══════════════════════════════════════════════════════════════
// ON PROFILE LOADED — single entry point after any profile change
// ═══════════════════════════════════════════════════════════════

function onProfileLoaded(profile) {
  activeProfile = profile;
  applyTheme(profile.themeId);
  // Update nav profile icon
  const navIcon = document.getElementById('nav-profil-icon');
  if (navIcon) navIcon.textContent = profile.emoji;
  // Sync SRS deck and streak
  syncDeck();
  updateStreak();
  updateStreakBadge();
  checkGiftUnlocks();
  // Navigate to home
  nav('home');
}

// ═══════════════════════════════════════════════════════════════
// BOOT — called once on app start
// ═══════════════════════════════════════════════════════════════

function bootProfiles() {
  const profiles = loadProfiles();
  if (profiles.length === 0) {
    showOnboarding(null); // fresh start
    return;
  }
  const activeId = LS.load('activeProfileId', null);
  const p = profiles.find(x => x.id === activeId) || profiles[0];
  LS.save('activeProfileId', p.id);
  onProfileLoaded(p);
}

// ═══════════════════════════════════════════════════════════════
// ONBOARDING — 6-step wizard
// Steps: 0=Welcome 1=Name 2=Emoji 3=Colour 4=Goal 5=Confirm
// ═══════════════════════════════════════════════════════════════

let ob = {
  step: 0,
  name: '',
  emoji: '',
  themeId: 'purple',
  dailyGoal: 10,
};

const OB_STEPS = 6; // 0..5

function showOnboarding(editProfile) {
  // editProfile = null means fresh profile, or a profile object to edit
  ob = {
    step:      0,
    name:      editProfile ? editProfile.name      : '',
    emoji:     editProfile ? editProfile.emoji     : '',
    themeId:   editProfile ? editProfile.themeId   : 'purple',
    dailyGoal: editProfile ? editProfile.dailyGoal : 10,
    editId:    editProfile ? editProfile.id        : null,
  };
  document.getElementById('ob-overlay').style.display = 'flex';
  obRenderStep();
}

function hideOnboarding() {
  document.getElementById('ob-overlay').style.display = 'none';
}

function obRenderStep() {
  const el = document.getElementById('ob-content');
  const prog = document.getElementById('ob-progress');
  const t = getTheme(ob.themeId);
  const pct = ob.step === 0 ? 0 : Math.round((ob.step / (OB_STEPS - 1)) * 100);
  if (prog) {
    prog.style.width      = pct + '%';
    prog.style.background = `linear-gradient(90deg,${t.primary},${t.primary}88)`;
  }

  const isEdit = !!ob.editId;

  // Back button (hidden on step 0)
  const backBtn = ob.step > 0
    ? `<button onclick="obBack()" style="background:none;border:none;color:var(--muted);
        font-size:22px;cursor:pointer;padding:0;align-self:flex-start;font-family:inherit">← Zurück</button>`
    : '';

  // Next / confirm button
  const nextDisabled =
    (ob.step === 1 && ob.name.trim().length < 2) ||
    (ob.step === 2 && !ob.emoji);
  const nextLabel = ob.step === OB_STEPS - 1
    ? (ob.emoji || '🦋') + ' ' + (isEdit ? 'Änderungen speichern' : `Los geht's, ${ob.name}!`)
    : 'Weiter →';
  const nextFn    = ob.step === OB_STEPS - 1 ? 'obConfirm()' : 'obNext()';
  const nextBtn = `<button onclick="${nextFn}"
    ${nextDisabled ? 'disabled' : ''}
    style="width:100%;background:${nextDisabled ? 'var(--cardl)' : `linear-gradient(135deg,${t.primary},${t.primary}cc)`};
      border:none;border-radius:16px;padding:15px;color:${nextDisabled ? 'var(--muted)' : 'white'};
      font-size:15px;font-weight:900;cursor:${nextDisabled ? 'not-allowed' : 'pointer'};
      font-family:inherit;transition:all 0.2s" id="ob-next-btn">

  let body = '';

  // ── STEP 0: Welcome

        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px">
        <input id="ob-name-inp" type="text" maxlength="20"
          value="${ob.name}"
          placeholder="Deinen Namen eingeben..."
          oninput="ob.name=this.value.trim();obRefreshNext()"
          style="width:100%;background:var(--cardd);
            border:2px solid ${ob.name.length>=2 ? t.primary : 'var(--border)'};
            border-radius:16px;padding:16px;color:var(--text);font-size:18px;
            font-weight:700;text-align:center;font-family:inherit;transition:border-color 0.2s"/>
        <div id="ob-name-preview" style="text-align:center;${ob.name.length<2?'opacity:0':'opacity:1'};transition:opacity 0.3s">

          <span style="color:var(--muted);font-size:14px"> 👋</span>
        </div>
      </div>
      ${backBtn}
      ${nextBtn}`;

  // ── STEP 2: Emoji
  else if (ob.step === 2) {
    const cats = [
      { id:'animals', label:'Tiere',         set:['🦋','🐬','🦄','🐱','🦊','🐼','🐨','🦁','🐸','🐙'] },
      { id:'nature',  label:'Natur & Magie', set:['🌸','🌺','🌻','⭐','🌙','🌈','🔮','💎','🍀','🌿'] },
      { id:'hobby',   label:'Spaß & Hobbys', set:['🎵','🎨','📚','✏️','🎭','🎪','🎠','🎡','🏆','🎯'] },
    ];
    body = `
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:8px">${ob.emoji || '❓'}</div>
        <div style="color:var(--text);font-size:22px;font-weight:900">Wähle dein Emoji</div>
        <div style="color:var(--muted);font-size:13px;margin-top:4px">Dein persönliches Symbol!</div>
      </div>
      <div style="flex:1;overflow-y:auto">
        ${cats.map(cat => `
          <div style="color:var(--muted);font-size:10px;font-weight:800;letter-spacing:1px;

            ${cat.set.map(e => `
              <button onclick="ob.emoji='${e}';obRenderStep()" style="
                width:50px;height:50px;border-radius:14px;font-size:26px;cursor:pointer;
                background:${ob.emoji===e ? t.primary+'33' : 'var(--card)'};
                border:2px solid ${ob.emoji===e ? t.primary : 'var(--border)'};
                transform:${ob.emoji===e ? 'scale(1.15)' : 'scale(1)'};
                transition:all 0.15s;font-family:inherit">${e}</button>`
            ).join('')}
          </div>`).join('')}
      </div>
      ${backBtn}
      ${nextBtn}`;
  }

  // ── STEP 3: Colour theme
  else if (ob.step === 3) {
    body = `
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:8px">${ob.emoji || '🎨'}</div>
        <div style="color:var(--text);font-size:22px;font-weight:900">Deine Lieblingsfarbe</div>
        <div style="color:var(--muted);font-size:13px;margin-top:4px">Töngt die gesamte App!</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:9px">
        ${THEMES.map(th => `
          <button onclick="ob.themeId='${th.id}';obRenderStep()" style="
            background:${ob.themeId===th.id ? th.primary+'22' : 'var(--card)'};
            border:2px solid ${ob.themeId===th.id ? th.primary : 'var(--border)'};
            border-radius:16px;padding:13px 16px;cursor:pointer;
            display:flex;align-items:center;gap:14px;font-family:inherit;transition:all 0.15s">
            <div style="width:38px;height:38px;border-radius:19px;flex-shrink:0;
              background:linear-gradient(135deg,${th.primary},${th.primary}88);
              display:flex;align-items:center;justify-content:center;
              font-size:18px;color:white;font-weight:900;
              box-shadow:${ob.themeId===th.id ? '0 0 14px '+th.primary+'66' : 'none'}">
              ${ob.themeId===th.id ? '✓' : ''}
            </div>
            <div style="text-align:left">
              <div style="color:${ob.themeId===th.id ? th.primary : 'var(--text)'};
                font-size:15px;font-weight:800">${th.name}</div>
              <div style="color:var(--muted);font-size:11px">Deine App-Akzentfarbe</div>
            </div>
          </button>`).join('')}
      </div>
      ${backBtn}
      ${nextBtn}`;
  }

  // ── STEP 4: Daily goal
  else if (ob.step === 4) {
    body = `
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:8px">${ob.emoji || '🎯'}</div>
        <div style="color:var(--text);font-size:22px;font-weight:900">Dein Tagesziel</div>
        <div style="color:var(--muted);font-size:13px;margin-top:4px">

        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:9px">
        ${GOALS.map(g => `
          <button onclick="ob.dailyGoal=${g.mins};obRenderStep()" style="
            background:${ob.dailyGoal===g.mins ? t.primary+'22' : 'var(--card)'};
            border:2px solid ${ob.dailyGoal===g.mins ? t.primary : 'var(--border)'};
            border-radius:16px;padding:14px 16px;cursor:pointer;
            display:flex;align-items:center;gap:14px;font-family:inherit;transition:all 0.15s">

              <div style="color:var(--text);font-size:15px;font-weight:800">${g.label}</div>

              ? `<span style="color:${t.primary};font-size:22px;font-weight:900">✓</span>` : ''}
          </button>`).join('')}

      ${backBtn}
      ${nextBtn}`;

  // ── STEP 5: Confirm
  else if (ob.step === 5) {
    const g = GOALS.find(g => g.mins === ob.dailyGoal) || GOALS[1];
    body = `
      <div style="text-align:center">
        <div style="color:var(--muted);font-size:12px;font-weight:700;margin-bottom:6px">
          ${isEdit ? 'ÄNDERUNGEN BESTÄTIGEN' : 'ALLES BEREIT?'}
        </div>
        <div style="color:var(--text);font-size:22px;font-weight:900">Dein Profil</div>

  // Apply live theme preview on colour step
  if (ob.step === 3) applyTheme(ob.themeId);

function obNext() {
  if (ob.step === 1 && ob.name.trim().length < 2) return;
  if (ob.step === 2 && !ob.emoji) return;
  ob.step = Math.min(ob.step + 1, OB_STEPS - 1);
  obRenderStep();
}

function obBack() {
  ob.step = Math.max(ob.step - 1, 0);
  obRenderStep();
}

function obRefreshNext() {
  // Re-render just the next button state without full re-render
  // (used for name input oninput — avoids losing cursor position)
  const t = getTheme(ob.themeId);
  const valid = ob.name.trim().length >= 2;
  const btn = document.getElementById('ob-next-btn');
  const inp = document.getElementById('ob-name-inp');
  const prev = document.getElementById('ob-name-preview');
  if (btn) {
    btn.disabled = !valid;
    btn.style.background = valid ? `linear-gradient(135deg,${t.primary},${t.primary}cc)` : 'var(--cardl)';
    btn.style.color      = valid ? 'white' : 'var(--muted)';
    btn.style.cursor     = valid ? 'pointer' : 'not-allowed';
  }
  if (inp) inp.style.borderColor = valid ? t.primary : 'var(--border)';
  if (prev) prev.style.opacity = valid ? '1' : '0';
  const nameSpan = prev?.querySelector('span:nth-child(2)');
  if (nameSpan) nameSpan.textContent = ob.name || '...';
}

function obConfirm() {
  if (!ob.name.trim() || !ob.emoji) return;
  if (ob.editId) {
    // Editing existing profile
    persistProfile({
      id:        ob.editId,
      name:      ob.name.trim(),
      emoji:     ob.emoji,
      themeId:   ob.themeId,
      dailyGoal: ob.dailyGoal,
    });
    hideOnboarding();
    showToast('✅ Profil aktualisiert!');
    onProfileLoaded(activeProfile);
  } else {
    // New profile
    const profiles = loadProfiles();
    if (profiles.length >= MAX_PROFILES) {
      showToast('⚠️ Maximum ' + MAX_PROFILES + ' Profile erreicht');
      return;
    }
    const newProfile = createProfile(ob);
    profiles.push(newProfile);
    saveProfiles(profiles);
    LS.save('activeProfileId', newProfile.id);
    hideOnboarding();
    onProfileLoaded(newProfile);
  }
}

        <span style="font-size:24px">➕</span> Neues Profil erstellen
        <span style="color:var(--muted);font-size:11px">(${MAX_PROFILES - profiles.length} frei)</span>
      </button>`;
  }

  list.innerHTML = html;
  document.getElementById('ps-overlay').style.display = 'flex';
}

function hideProfileSelector() {
  document.getElementById('ps-overlay').style.display = 'none';
}

function selectProfile(id) {
  const profiles = loadProfiles();
  const p = profiles.find(x => x.id === id);
  if (!p) return;
  LS.save('activeProfileId', id);
  hideProfileSelector();
  onProfileLoaded(p);
}

function editProfile(id) {
  const profiles = loadProfiles();
  const p = profiles.find(x => x.id === id);
  if (!p) return;
  hideProfileSelector();
  showOnboarding(p); // re-use onboarding as editor
}

function addNewProfile() {
  hideProfileSelector();
  showOnboarding(null);
}

function confirmDeleteProfileInSelector(id) {
  const profiles = loadProfiles();
  const p = profiles.find(x => x.id === id);
  if (!p) return;
  const card = document.getElementById('ps-list');
  // Replace just the button row with confirm UI
  const el = document.querySelector(`[onclick="confirmDeleteProfileInSelector('${id}')"]`)?.closest('div[style*="border-radius:20px"]`);
  // Simpler: use a toast-style confirm overlay
  if (!confirm(`Profil "${p.name}" wirklich löschen? Alle Lernfortschritte werden entfernt.`)) return;
  deleteProfileById(id);
}

function deleteProfileById(id) {
  let profiles = loadProfiles();
  profiles = profiles.filter(p => p.id !== id);
  saveProfiles(profiles);
  localStorage.removeItem('blapp_' + id + '_deck');
  localStorage.removeItem('blapp_' + id + '_streak');
  if (profiles.length === 0) {
    hideProfileSelector();
    showOnboarding(null);
  } else {
    if (activeProfile?.id === id) {
      LS.save('activeProfileId', profiles[0].id);
      onProfileLoaded(profiles[0]);
    } else {
      showProfileSelector();
    }
  }
}

  el.innerHTML = `
    <div style="padding:12px 16px 24px;display:flex;flex-direction:column;gap:16px">

      <!-- Header -->
      <div style="color:var(--text);font-size:17px;font-weight:900;padding-top:6px">👤 Mein Profil</div>

      <!-- Profile summary card -->
      <div style="background:linear-gradient(135deg,${theme.primary}18,${theme.primary}06);
        border:2px solid ${theme.primary}44;border-radius:22px;padding:20px;
        display:flex;flex-direction:column;align-items:center;gap:12px">
        <div style="width:72px;height:72px;border-radius:36px;font-size:38px;

            border-radius:16px;padding:4px 12px;color:${theme.primary};font-size:12px;font-weight:800">
            🎨 ${theme.name}
          </span>
          <span style="background:${theme.primary}22;border:1px solid ${theme.primary}44;
            border-radius:16px;padding:4px 12px;color:${theme.primary};font-size:12px;font-weight:800">
            ${g.emoji} ${g.label}/Tag
          </span>
          <span style="background:${theme.primary}22;border:1px solid ${theme.primary}44;
            border-radius:16px;padding:4px 12px;color:${theme.primary};font-size:12px;font-weight:800">
            🔥 ${p.streak||0} Tage

        </div>
        <!-- Edit button -->

          background:linear-gradient(135deg,${theme.primary},${theme.primary}cc);

      <!-- Lernpfad & Geschenke -->
      <div class="card">
        <div class="label" style="margin-bottom:12px">Lernpfad & Erfolgs-Geschenke</div>

        </div>
        <div style="background:rgba(255,255,255,0.08);border-radius:6px;height:8px;margin-bottom:16px">
          <div style="width:${pct}%;height:100%;border-radius:6px;
            background:linear-gradient(90deg,${theme.primary},${theme.primary}88);
            transition:width 0.8s ease"></div>
        </div>
        <!-- 5 gift boxes -->
        <div style="display:flex;flex-direction:column;gap:10px">
          ${GIFT_LEVELS.map(gl => {
            const reached = pct >= gl.pct;
            const gift = gifts[gl.step];
            const prev = gl.step === 1 ? 0 : GIFT_LEVELS[gl.step-2].pct;
            const segPct = Math.min(100, Math.max(0,
              Math.round((pct - prev) / (gl.pct - prev) * 100)));
            return `
              <div style="background:${reached ? theme.primary+'18' : 'rgba(255,255,255,0.04)'};
                border:1px solid ${reached ? theme.primary+'55' : 'var(--border)'};
                border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px">
                <div style="font-size:28px;flex-shrink:0;

          display:flex;align-items:center;justify-content:center;gap:8px">

      </div>

    </div>

}
