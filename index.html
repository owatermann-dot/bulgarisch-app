<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0A0914"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="KidsLearn"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<title>KidsLearn Bulgarisch</title>
<style>
:root {
  --bg:#0A0914; --card:#13112A; --cardl:#1C1938; --cardd:#0E0C1F;
  --rose:#FF6B6B; --gold:#FFD166; --teal:#06D6A0;
  --text:#F0ECFF; --muted:#6B6880; --border:#252240;
  --primary:#A855F7; --pt:rgba(168,85,247,.25); --pg:rgba(168,85,247,.4);
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);
  font-family:'Nunito',sans-serif;overflow:hidden;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;font-size:17px;}
button{font-family:inherit;cursor:pointer;}
textarea,input{font-family:inherit;}
input:focus,textarea:focus{outline:none;border-color:var(--primary)!important;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* Shell */
#app{position:fixed;inset:0;display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;background:var(--bg);
  padding-top:var(--safe-t);padding-bottom:var(--safe-b);}
#statusbar{height:44px;display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;flex-shrink:0;}

/* Screens */
.screen{flex:1;overflow-y:auto;display:none;flex-direction:column;
  -webkit-overflow-scrolling:touch;}
.screen.active{display:flex;}

/* Nav */
#botnav{display:flex;background:var(--card);border-top:1px solid var(--border);
  padding:6px 0 14px;flex-shrink:0;}
.nb{flex:1;background:none;border:none;display:flex;flex-direction:column;
  align-items:center;gap:2px;padding:4px 0;position:relative;}
.ni{font-size:22px;}.nl{font-size:9px;font-weight:800;letter-spacing:.4px;color:var(--muted);text-transform:uppercase;}
.nb.active .nl{color:var(--primary);}
.nbar{width:18px;height:3px;background:var(--primary);border-radius:2px;display:none;}
.nb.active .nbar{display:block;}
.nbadge{position:absolute;top:0;right:14%;background:var(--rose);border-radius:8px;
  min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:900;color:#fff;padding:0 3px;}

/* Cards */
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px 16px;}
.lbl{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.prog-t{background:rgba(255,255,255,.08);border-radius:6px;}
.prog-f{height:100%;border-radius:6px;transition:width .7s ease;}
.stat-grid{display:flex;gap:8px;}
.stat-cell{flex:1;background:var(--card);border-radius:14px;padding:10px 6px;
  border:1px solid var(--border);text-align:center;}
.stat-v{font-size:18px;font-weight:900;}
.stat-l{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-top:2px;}

/* Mode toggle */
.mtoggle{display:flex;gap:8px;padding:10px 14px;background:var(--card);
  border-bottom:1px solid var(--border);flex-shrink:0;}
.mbtn{flex:1;background:var(--cardl);border:1px solid var(--border);border-radius:12px;
  padding:9px;color:var(--muted);font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;}
.mbtn.active{background:var(--pt);border-color:var(--primary);color:var(--primary);}

/* Rating */
.rrow{display:flex;gap:7px;}
.rbtn{flex:1;border:none;border-radius:13px;padding:12px 4px;font-size:11px;
  font-weight:800;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.rbtn .ri{font-size:18px;}

/* Chat bubbles */
.bapp{background:var(--cardl);border-radius:13px 13px 13px 3px;
  padding:9px 12px;max-width:230px;border:1px solid var(--border);}
.busr{background:linear-gradient(135deg,rgba(255,107,107,.25),rgba(168,85,247,.18));
  border-radius:13px 13px 3px 13px;padding:9px 12px;max-width:220px;
  border:1px solid rgba(255,107,107,.33);}

/* Overlays */
.overlay{display:none;position:fixed;inset:0;z-index:100;
  background:var(--bg);flex-direction:column;max-width:430px;margin:0 auto;}
.overlay.open{display:flex;}

/* Sheet + backdrop */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;}
.backdrop.open{display:block;}
.sheet{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;background:var(--card);border-radius:22px 22px 0 0;
  padding:0 18px 36px;z-index:210;max-height:88vh;overflow-y:auto;}
.sheet.open{display:block;animation:slideUp .3s ease;}
.shandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px;}

/* Topic grid */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:12px;cursor:pointer;text-align:left;display:flex;flex-direction:column;
  gap:8px;transition:all .2s;font-family:inherit;font-size:inherit;}

/* Admin */
.tcluster{background:var(--card);border-radius:16px;border:1px solid var(--border);
  overflow:hidden;margin-bottom:8px;}
.srow{background:var(--cardd);border-radius:10px;border:1px solid var(--border);
  padding:9px 10px;display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;}
.sbadge{padding:1px 5px;border-radius:4px;font-size:8px;font-weight:800;}
.sbtn{border:none;border-radius:6px;padding:4px 6px;font-size:12px;cursor:pointer;}

/* Goodie modal */
#gmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
  align-items:center;justify-content:center;z-index:300;padding:24px;}
#gmodal.open{display:flex;}
.gmcard{background:var(--card);border-radius:28px;padding:28px;
  width:100%;max-width:320px;text-align:center;animation:pop .35s ease;}
.gmdots{display:flex;justify-content:center;gap:5px;margin-bottom:14px;}
.gmdot{width:7px;height:7px;border-radius:4px;}

/* PIN modal */
#pinmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;z-index:400;padding:24px;}
#pinmodal.open{display:flex;}
.pmcard{background:var(--card);border-radius:24px;padding:28px 24px;
  width:300px;text-align:center;border:1px solid var(--border);}
.pinrow{display:flex;gap:10px;justify-content:center;margin:16px 0;}
.pini{width:52px;height:56px;background:var(--cardd);border:2px solid var(--border);
  border-radius:12px;text-align:center;font-size:22px;font-weight:900;color:var(--text);
  transition:border-color .2s;}
.pini.filled{border-color:var(--primary);}

/* Toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--cardl);border:1px solid var(--border);border-radius:12px;
  padding:10px 18px;color:var(--text);font-size:13px;font-weight:700;
  display:none;z-index:500;white-space:nowrap;}
#toast.show{display:block;animation:fadeIn .3s ease;}

/* Install banner */
#ibanner{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:400px;
  background:linear-gradient(135deg,var(--primary),#6366f1);
  border-radius:16px;padding:12px 16px;display:none;align-items:center;gap:10px;
  z-index:50;box-shadow:0 8px 32px var(--pg);}
#ibanner.show{display:flex;}

/* Animations */
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pop{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px var(--pg)}50%{box-shadow:0 0 24px var(--pg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="app">

  <!-- ══ ONBOARDING OVERLAY ══ -->
  <div id="ob-overlay" class="overlay">
    <div style="height:4px;background:var(--cardl);flex-shrink:0">
      <div id="ob-prog" style="height:100%;border-radius:2px;width:0;transition:width .4s ease,background .4s"></div>
    </div>
    <div id="ob-body" style="flex:1;overflow-y:auto;padding:28px 22px 32px;display:flex;flex-direction:column;gap:18px"></div>
  </div>

  <!-- ══ PROFILE SELECTOR OVERLAY ══ -->
  <div id="ps-overlay" class="overlay" style="padding:44px 20px 32px;overflow-y:auto">
    <div style="text-align:center;margin-bottom:24px">
      <div id="ps-hdr-emoji" style="font-size:44px;margin-bottom:8px">🦋</div>
      <div style="color:var(--text);font-size:22px;font-weight:900">Wer lernt heute?</div>
      <div style="color:var(--muted);font-size:13px;margin-top:4px">Profil wählen</div>
    </div>
    <div id="ps-list"></div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="clock" style="font-size:13px;font-weight:700">9:41</span>
    <div style="width:90px;height:10px;background:var(--card);border-radius:8px"></div>
    <span style="font-size:12px">●●● 🔋</span>
  </div>

  <!-- Screen container -->
  <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">

    <!-- HOME -->
    <div class="screen active" id="screen-home" style="padding:0 16px 16px;gap:12px"></div>

    <!-- LEARN -->
    <div class="screen" id="screen-learn" style="padding:0">
      <div class="mtoggle">
        <button class="mbtn active" id="mb-saetze" onclick="setMode('saetze')"><span>📖</span>Sätze</button>
        <button class="mbtn" id="mb-zahlen" onclick="setMode('zahlen')"><span>🔢</span>Zahlen</button>
      </div>
      <div id="learn-body" style="flex:1;overflow-y:auto;padding:12px 14px 16px;display:flex;flex-direction:column;gap:12px"></div>
    </div>

    <!-- GESPRÄCH -->
    <div class="screen" id="screen-chat" style="padding:12px 14px;gap:10px">
      <div style="color:var(--text);font-size:16px;font-weight:900">💬 Gespräch</div>
      <div id="chat-topics" style="display:flex;gap:5px;overflow-x:auto;flex-shrink:0;padding-bottom:2px"></div>
      <div id="chat-msgs" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px"></div>
      <div id="chat-prompt" style="display:none"></div>
      <div id="chat-ctrl" style="display:none;padding-top:7px;border-top:1px solid var(--border)"></div>
    </div>

    <!-- PROFIL -->
    <div class="screen" id="screen-profil" style="padding:0">
      <div id="profil-body" style="flex:1;overflow-y:auto;padding:12px 16px 24px;display:flex;flex-direction:column;gap:14px"></div>
    </div>

    <!-- ADMIN -->
    <div class="screen" id="screen-admin" style="padding:0">
      <div id="admin-hdr" style="background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px 8px;flex-shrink:0"></div>
      <div id="admin-body" style="flex:1;overflow-y:auto;padding:8px 12px 0"></div>
    </div>

  </div><!-- /screen container -->

  <!-- Bottom nav -->
  <nav id="botnav">
    <button class="nb active" id="nb-home" onclick="nav('home')"><span class="ni">🏠</span><span class="nl">Home</span><div class="nbar"></div></button>
    <button class="nb" id="nb-learn" onclick="nav('learn')"><span class="ni">📖</span><span class="nl">Lernen</span><div class="nbar"></div></button>
    <button class="nb" id="nb-chat" onclick="nav('chat')"><span class="ni">💬</span><span class="nl">Gespräch</span><div class="nbar"></div></button>
    <button class="nb" id="nb-profil" onclick="nav('profil')"><span class="ni" id="nb-profil-icon">👤</span><span class="nl">Profil</span><div class="nbar"></div></button>
    <button class="nb" id="nb-admin" onclick="nav('admin')"><span class="ni">⚙️</span><span class="nl">Admin</span><div class="nbar"></div></button>
  </nav>

</div><!-- /app -->

<!-- Goodie modal -->
<div id="gmodal" onclick="closeGoodie()">
  <div class="gmcard" onclick="event.stopPropagation()" id="gm-inner">
    <div class="gmdots" id="gm-dots"></div>
    <div id="gm-icon" style="font-size:52px;animation:float 2s ease-in-out infinite"></div>
    <div id="gm-title" style="font-size:17px;font-weight:900;margin-top:12px"></div>
    <div id="gm-text" style="font-size:13px;line-height:1.65;margin-top:10px;color:var(--text)"></div>
    <button onclick="closeGoodie()" id="gm-btn"
      style="margin-top:20px;border:none;border-radius:16px;padding:12px 32px;color:#fff;font-size:14px;font-weight:900;width:100%">Danke! 🎉</button>
  </div>
</div>

<!-- PIN modal -->
<div id="pinmodal" onclick="closePIN()">
  <div class="pmcard" onclick="event.stopPropagation()">
    <div style="font-size:34px;margin-bottom:10px">🔐</div>
    <div id="pm-title" style="color:var(--text);font-size:14px;font-weight:900;margin-bottom:4px"></div>
    <div id="pm-err" style="color:var(--rose);font-size:12px;min-height:16px;margin-bottom:4px"></div>
    <div class="pinrow">
      <input class="pini" type="password" inputmode="numeric" maxlength="1" id="p0" oninput="pinKey(0)"/>
      <input class="pini" type="password" inputmode="numeric" maxlength="1" id="p1" oninput="pinKey(1)"/>
      <input class="pini" type="password" inputmode="numeric" maxlength="1" id="p2" oninput="pinKey(2)"/>
      <input class="pini" type="password" inputmode="numeric" maxlength="1" id="p3" oninput="pinKey(3)"/>
    </div>
    <button onclick="closePIN()" style="background:var(--cardl);border:1px solid var(--border);border-radius:10px;padding:9px 22px;color:var(--muted);font-size:12px;width:100%">Abbrechen</button>
  </div>
</div>

<!-- Edit sheet -->
<div id="edit-back" class="backdrop" onclick="closeEdit()"></div>
<div id="edit-sheet" class="sheet">
  <div class="shandle"></div>
  <div id="edit-title" style="color:var(--text);font-size:15px;font-weight:900;margin-bottom:12px"></div>
  <div style="margin-bottom:10px">
    <div class="lbl">🇩🇪 Deutsch *</div>
    <textarea id="e-de" rows="2" style="width:100%;background:var(--cardd);border:1px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-size:16px;resize:none"></textarea>
  </div>
  <div style="margin-bottom:10px">
    <div class="lbl">🇬🇧 English</div>
    <textarea id="e-en" rows="2" style="width:100%;background:var(--cardd);border:1px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-size:16px;resize:none"></textarea>
  </div>
  <div style="margin-bottom:12px">
    <div class="lbl">🇧🇬 Български *</div>
    <textarea id="e-bg" rows="2" style="width:100%;background:var(--cardd);border:1px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-size:16px;resize:none"></textarea>
  </div>
  <button onclick="ttsPrev()" style="background:rgba(168,85,247,.18);border:1px solid rgba(168,85,247,.44);border-radius:8px;padding:7px 14px;color:var(--primary);font-size:11px;font-weight:800;margin-bottom:10px">🔊 TTS Vorschau</button>
  <div style="display:flex;gap:8px">
    <button onclick="closeEdit()" style="flex:1;background:var(--cardl);border:1px solid var(--border);border-radius:11px;padding:11px;color:var(--muted);font-size:13px;font-weight:800">Abbrechen</button>
    <button onclick="commitEdit()" style="flex:2;background:linear-gradient(135deg,var(--primary),var(--primary)cc);border:none;border-radius:11px;padding:11px;color:#fff;font-size:13px;font-weight:900">Speichern ✓</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Install banner -->
<div id="ibanner">
  <div style="flex:1"><div style="color:#fff;font-size:13px;font-weight:800">App installieren</div>
    <div style="color:rgba(255,255,255,.7);font-size:11px">Zum Startbildschirm hinzufügen</div></div>
  <button id="install-btn" style="background:#fff;border:none;border-radius:10px;padding:7px 12px;color:var(--primary);font-size:11px;font-weight:900">Installieren</button>
  <button onclick="document.getElementById('ibanner').classList.remove('show')" style="background:none;border:none;color:rgba(255,255,255,.6);font-size:18px">✕</button>
</div>

<!-- File inputs -->
<input type="file" id="audio-file-inp" accept="audio/*" style="display:none" onchange="handleAudio()"/>
<input type="file" id="csv-file-inp" accept=".csv,.txt" style="display:none" onchange="handleCSV()"/>

<script>

function cardNew(id){return{id,interval:0,ef:2.5,reps:0,due:Date.now(),phase:'new',reviewed:null};}
function sm2(c,q){
  let {interval:iv,ef,reps}=c;
  if(q>=3){iv=reps===0?1:reps===1?6:Math.round(iv*ef);reps++;}
  else{iv=1;reps=0;}
  ef=Math.max(1.3,Math.min(2.5,ef+0.1-(5-q)*(0.08+(5-q)*0.02)));
  const due=Date.now()+iv*DAY_MS;
  let phase=c.phase==='new'?'learning':c.phase;
  if(reps>=3&&iv>=7)phase='review';
  if(reps>=6&&iv>=21)phase='mastered';
  return{...c,interval:iv,ef,reps,due,phase,reviewed:Date.now()};
}
function isDue(c){return Date.now()>=c.due;}
function fmtDue(ms){const d=ms-Date.now();if(d<=0)return'Jetzt';const h=Math.floor(d/3600000);return h<24?h+'h':Math.floor(d/DAY_MS)+'d';}

// Profile-scoped key
const pk=k=>A.profile?`${A.profile.id}_${k}`:k;
function loadDeck(){A.deck=LS.g(pk('deck'),{});syncDeck();}
function saveDeck(){LS.s(pk('deck'),A.deck);}
function loadAudio(){A.audio=LS.g(pk('audio'),{});}
function saveAudio(){LS.s(pk('audio'),A.audio);}
function loadStreak(){
  A.streak=LS.g(pk('streak'),{count:0,lastDate:null});
  const today=new Date().toDateString(), yday=new Date(Date.now()-DAY_MS).toDateString();
  if(A.streak.lastDate===today)return;
  if(A.streak.lastDate===yday)A.streak.count++;
  else if(A.streak.lastDate!==null)A.streak.count=1;
  A.streak.lastDate=today; LS.s(pk('streak'),A.streak);
}
function syncDeck(){
  let ch=false;
  allS(null).forEach(s=>{if(!A.deck[s.id]){A.deck[s.id]=cardNew(s.id);ch=true;}});
  if(ch)saveDeck();
}
function getTopics(){return LS.g('topics',INITIAL_TOPICS);}
function saveTopics(t){LS.s('topics',t);}
function allS(tid){
  const ts=getTopics();
  if(tid){const t=ts.find(t=>t.id===tid);return t?t.sentences.map(s=>({...s,unit:t.name})):[];}
  return ts.flatMap(t=>t.sentences.map(s=>({...s,unit:t.name})));
}
function perfCnt(tid){return allS(tid).filter(s=>A.deck[s.id]?.phase==='mastered').length;}
function lpPct(){return Math.min(100,Math.round(perfCnt(null)/LERNPFAD_BASE*100));}
function lpLevel(pct){let l=LP_LEVELS[0];for(const x of LP_LEVELS){if(pct>=x.min)l=x;}return l;}
function dailyTarget(){return Math.max(3,Math.round((A.profile?.dailyGoal||10)/1.8));}
function todaySents(){
  const today=new Date().toDateString();
  return Object.values(A.deck).filter(c=>c.reviewed&&new Date(c.reviewed).toDateString()===today).length;
}
function buildQ(tid){
  const sents=allS(tid), tgt=dailyTarget();
  const due=sents.filter(s=>{const c=A.deck[s.id];return c&&c.phase!=='new'&&c.phase!=='mastered'&&isDue(c);});
  const newC=sents.filter(s=>{const c=A.deck[s.id];return c&&c.phase==='new';}).slice(0,Math.max(0,tgt-due.length));
  return [...due,...newC];
}

function applyTheme(tid){
  const t=getTheme(tid);
  const r=document.documentElement.style;
  r.setProperty('--primary',t.p);
  r.setProperty('--pt',t.p+'33');
  r.setProperty('--pg',t.p+'44');
  document.querySelectorAll('.nb').forEach(b=>{
    const on=b.classList.contains('active');
    const lbl=b.querySelector('.nl'),bar=b.querySelector('.nbar');
    if(lbl)lbl.style.color=on?t.p:'';
    if(bar)bar.style.background=on?t.p:'';
  });
}
// ── Bulgarian TTS with async voice loading + bg-BG voice selection
let _bgVoice=null, _voicesReady=false;
function pickBgVoice(){
  if(!('speechSynthesis' in window))return null;
  const vs=window.speechSynthesis.getVoices();
  if(!vs||!vs.length)return null;
  _voicesReady=true;
  const bg=vs.filter(v=>/^bg(-|_|$)/i.test(v.lang)||/bulgar/i.test(v.name));
  if(!bg.length){ _bgVoice=null; return null; }
  // Prefer a female-sounding voice (per pedagogy: young female native speaker)
  const fem=bg.find(v=>/female|жена|krasimira|silvia|elena|maria/i.test(v.name));
  _bgVoice=fem||bg[0];
  return _bgVoice;
}
if('speechSynthesis' in window){
  pickBgVoice();
  window.speechSynthesis.onvoiceschanged=pickBgVoice;
}
function speak(txt,rate=0.82){
  if(!('speechSynthesis' in window)||!txt)return;
  if(!_voicesReady||!_bgVoice)pickBgVoice();
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='bg-BG';u.rate=rate;
  if(_bgVoice)u.voice=_bgVoice;
  window.speechSynthesis.speak(u);
}
function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function badge(){
  document.querySelectorAll('.nbadge').forEach(b=>b.remove());
  const due=buildQ(null).length;
  if(due>0){
    const btn=document.getElementById('nb-learn');
    const b=document.createElement('div');b.className='nbadge';
    b.textContent=due>99?'99+':due;btn.appendChild(b);
  }
}
function checkGifts(){
  const pct=lpPct(),gifts=getGifts();let ch=false;
  GIFT_LEVELS.forEach(gl=>{
    if(pct>=gl.pct&&!gifts[gl.step].unlocked){

}

function nav(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

  document.getElementById('screen-'+id)?.classList.add('active');

}

    <div style="display:flex;align-items:center;gap:8px">

function lBlockTarget(cur){
  const isNew=A.deck[cur.id]?.phase==='new';
  const rTgt=isNew?LEARN_NEW:LEARN_REV;
  return Math.min(LISTEN_BLOCK, rTgt-A.lBlock*LISTEN_BLOCK);
}
function lPlay(){
  const q=A.lQueue[A.lIdx%Math.max(1,A.lQueue.length)];if(!q)return;
  speak(q.bg);A.lShowBg=true;A.lReps++;A.lBlockReps++;
  if(A.lBlockReps>=lBlockTarget(q))setTimeout(()=>{A.lPhase='speak';renderSents();},900);
  else renderSents();
}
function lRecord(){
  const btn=document.getElementById('rec-btn');
  if(btn){btn.style.background='linear-gradient(135deg,#FF6B6B,#ff4757)';btn.innerHTML='<span style="font-size:20px">⏹</span>Zuhören...';}
  A.lTranscript='';
  const SRE=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SRE){try{
    const r=new SRE();r.lang='bg-BG';r.interimResults=false;
    r.onresult=e=>{A.lTranscript=e.results[0][0].transcript;};
    r.onerror=r.onend=()=>{lAfterSpeak();};
    r.start();return;
  }catch(e){}}
  setTimeout(()=>{lAfterSpeak();},2400);
}
// After a speak rep: go to next listen-block, or to rating if this was the last block
function lAfterSpeak(){
  const q=A.lQueue[A.lIdx%Math.max(1,A.lQueue.length)];if(!q){renderSents();return;}
  const isNew=A.deck[q.id]?.phase==='new';
  const rTgt=isNew?LEARN_NEW:LEARN_REV;
  const blocksTotal=Math.ceil(rTgt/LISTEN_BLOCK);
  if(A.lBlock+1>=blocksTotal){
    A.lPhase='result';
  } else {
    A.lBlock++;A.lBlockReps=0;A.lTranscript='';A.lPhase='listen';
  }
  renderSents();
}
function lRate(q){
  const cur=A.lQueue[A.lIdx%Math.max(1,A.lQueue.length)];if(!cur)return;
  let upd=sm2(A.deck[cur.id],q);
  if(q<5&&upd.phase==='mastered')upd={...upd,phase:'review'};
  A.deck[cur.id]=upd;saveDeck();
  if(q===5&&Math.random()>.5)showGoodie();
  checkGifts();
  A.lIdx++;A.lReps=0;A.lBlock=0;A.lBlockReps=0;A.lPhase='listen';A.lShowBg=false;A.lTranscript='';
  badge();renderSents();
  if(A.screen==='home')renderHome();
}

function numCheck(){

}
function numGuess(n){
  const ok=n===A.numCur;
  A.numRes=ok?'ok':'wrong';A.numScore={ok:A.numScore.ok+(ok?1:0),n:A.numScore.n+1};
  A.numStreak=ok?A.numStreak+1:0;renderNums();

function renderChat(){

function setConvo(k){

  const conv=CONVOS[A.chatTopic],cur=conv[A.chatStep];

  const ctrl=document.getElementById('chat-ctrl');
  let h='';
  conv.forEach((msg,i)=>{

    if(msg.s==='app'&&i<=A.chatStep){
      h+=`<div style="display:flex;gap:8px;align-items:flex-end;animation:fadeIn .3s ease">

        </div>
      </div>`;
    }
    if(msg.s==='usr'&&ua){
      h+=`<div style="display:flex;justify-content:flex-end;animation:fadeIn .3s ease">
        <div class="busr"><div style="color:var(--text);font-size:13px;font-weight:700">${ua.text}</div></div>
      </div>`;
    }
  });
  msgs.innerHTML=h;msgs.scrollTop=msgs.scrollHeight;
  if(!A.chatDone&&cur?.s==='usr'){
    prompt.style.display='block';
    prompt.innerHTML=`<div style="background:rgba(255,209,102,.06);border-radius:11px;padding:10px;border:1px dashed rgba(255,209,102,.44)">
      <div style="color:var(--gold);font-size:10px;font-weight:800;letter-spacing:1px">DEINE ANTWORT</div>
      <div style="color:var(--text);font-size:13px;margin-top:3px">${cur.prompt}</div>
      ${A.chatHint?`<div style="color:var(--muted);font-size:12px;margin-top:5px;font-style:italic;background:rgba(255,255,255,.05);border-radius:7px;padding:5px 8px">💡 ${cur.hint}</div>`:''}
    </div>`;
    ctrl.style.display='flex';ctrl.style.gap='7px';
    ctrl.innerHTML=`
      <button onclick="A.chatHint=!A.chatHint;renderConvoMsgs()" style="background:var(--cardl);border:1px solid var(--border);border-radius:11px;padding:9px 12px;color:var(--muted);font-size:14px;cursor:pointer">💡</button>

        <span style="font-size:19px">🎤</span>Sprechen
      </button>`;
  } else if(A.chatDone){
    prompt.style.display='none';ctrl.style.display='none';
    msgs.innerHTML+=`<div class="card" style="text-align:center;background:rgba(6,214,160,.15);border-color:rgba(6,214,160,.44);animation:pop .4s ease;margin-top:8px">

      <button onclick="setConvo(A.chatTopic)" style="background:var(--teal);border:none;border-radius:10px;padding:8px 20px;color:var(--bg);font-size:12px;font-weight:900;margin-top:9px;cursor:pointer">Nochmal 🔄</button>
    </div>`;
    msgs.scrollTop=msgs.scrollHeight;
  } else {prompt.style.display='none';ctrl.style.display='none';}
}
function chatRec(){
  const btn=document.getElementById('chat-rec');
  if(btn){btn.style.background='linear-gradient(135deg,#FF6B6B,#ff4757)';btn.innerHTML='<span style="font-size:19px">⏹</span>Zuhören...';}
  const cur=CONVOS[A.chatTopic][A.chatStep];
  setTimeout(()=>{
    A.chatAnswered.push({i:A.chatStep,text:cur?.hint||'...'});
    setTimeout(()=>{
      if(A.chatStep+1<CONVOS[A.chatTopic].length){
        A.chatStep++;
        const n=CONVOS[A.chatTopic][A.chatStep];
        if(n?.s==='app')setTimeout(()=>speak(n.bg),350);
      } else A.chatDone=true;
      renderConvoMsgs();
    },700);
  },2000);
}

// Live name input — updates preview + Next WITHOUT re-rendering the input
// (re-rendering on every keystroke is what dismissed the mobile keyboard)
function obNameInput(v){
  OB.name=v;

  const ok=v.trim().length>=2;
  const inp=document.getElementById('ob-name-inp');
  if(inp)inp.style.borderColor=ok?t.p:'var(--border)';

function psDel(id){
  const p=LS.g('profiles',[]).find(x=>x.id===id);if(!p)return;

let _pinCB=null;
function requirePIN(cb){
  if(A.pinOK){cb();return;}
  A.adminPin=LS.g('adminPin',null);
  if(!A.adminPin)openPIN('set',cb); else openPIN('check',cb);
}
function openPIN(mode,cb){
  A._pMode=mode;A._pStep=mode==='set'?'enter':'check';A._pFirst='';_pinCB=cb;
  document.getElementById('pm-title').textContent=mode==='set'?'Admin-PIN festlegen (4 Ziffern)':'Admin-PIN eingeben';
  document.getElementById('pm-err').textContent='';
  [0,1,2,3].forEach(i=>{const el=document.getElementById('p'+i);el.value='';el.classList.remove('filled');});
  document.getElementById('pinmodal').classList.add('open');
  setTimeout(()=>document.getElementById('p0')?.focus(),100);
}
function closePIN(){document.getElementById('pinmodal').classList.remove('open');_pinCB=null;}
function pinKey(i){
  const v=document.getElementById('p'+i).value.replace(/\D/,'');
  document.getElementById('p'+i).value=v;
  document.getElementById('p'+i).classList.toggle('filled',!!v);
  if(v&&i<3){document.getElementById('p'+(i+1)).focus();return;}
  if(v&&i===3){
    const entered=[0,1,2,3].map(j=>document.getElementById('p'+j).value).join('');
    if(entered.length<4)return;
    if(A._pMode==='set'){
      if(A._pStep==='enter'){
        A._pFirst=entered;A._pStep='confirm';
        document.getElementById('pm-title').textContent='PIN bestätigen';
        document.getElementById('pm-err').textContent='';
        [0,1,2,3].forEach(j=>{document.getElementById('p'+j).value='';document.getElementById('p'+j).classList.remove('filled');});
        setTimeout(()=>document.getElementById('p0').focus(),50);
      } else {
        if(entered===A._pFirst){
          A.adminPin=entered;A.pinOK=true;LS.s('adminPin',entered);
          closePIN();toast('✅ PIN festgelegt!');if(_pinCB){_pinCB();_pinCB=null;}
        } else {
          document.getElementById('pm-err').textContent='PINs stimmen nicht überein';
          A._pStep='enter';A._pFirst='';
          [0,1,2,3].forEach(j=>{document.getElementById('p'+j).value='';document.getElementById('p'+j).classList.remove('filled');});
          setTimeout(()=>document.getElementById('p0').focus(),50);
        }
      }
    } else {
      if(entered===A.adminPin){
        A.pinOK=true;closePIN();toast('🔓 Entsperrt!');if(_pinCB){_pinCB();_pinCB=null;}
      } else {
        document.getElementById('pm-err').textContent='Falsche PIN';
        [0,1,2,3].forEach(j=>{document.getElementById('p'+j).value='';document.getElementById('p'+j).classList.remove('filled');});
        setTimeout(()=>document.getElementById('p0').focus(),50);
      }
    }
  }
}

function openEdit(sentence,topicId){
  A.editTarget=sentence||null;A.addTopic=topicId||null;

  document.getElementById('e-de').value=sentence?.de||'';
  document.getElementById('e-en').value=sentence?.en||'';
  document.getElementById('e-bg').value=sentence?.bg||'';

  document.getElementById('edit-back').classList.add('open');
}
function closeEdit(){
  document.getElementById('edit-sheet').classList.remove('open');
  document.getElementById('edit-back').classList.remove('open');
  A.editTarget=null;A.addTopic=null;
}
function ttsPrev(){const bg=document.getElementById('e-bg').value.trim();if(bg)speak(bg);}
function commitEdit(){
  const de=document.getElementById('e-de').value.trim();
  const en=document.getElementById('e-en').value.trim();
  const bg=document.getElementById('e-bg').value.trim();
  if(!de||!bg){toast('⚠️ Deutsch und Bulgarisch sind Pflichtfelder');return;}
  requirePIN(()=>{
    let topics=getTopics();
    if(A.addTopic){
      const ns={id:nid(),de,en,bg,origin:'teacher'};
      topics=topics.map(t=>t.id===A.addTopic?{...t,sentences:[...t.sentences,ns]}:t);
      A.deck[ns.id]=cardNew(ns.id);
    } else if(A.editTarget){
      topics=topics.map(t=>({...t,sentences:t.sentences.map(s=>s.id===A.editTarget.id?{...s,de,en,bg}:s)}));
    }
    saveTopics(topics);saveDeck();closeEdit();toast('✅ Gespeichert!');renderAdminSents();
  });
}
function handleAudio(){
  const f=document.getElementById('audio-file-inp').files[0];if(!f||!A.uploadId)return;
  A.audio[A.uploadId]=f.name;saveAudio();
  A.uploadId=null;document.getElementById('audio-file-inp').value='';
  toast('✅ Audio: '+f.name);renderAdminSents();
}

function expCSV(tid){
  const topics=tid?getTopics().filter(t=>t.id===tid):getTopics();
  const rows=[['ID','Thema','Deutsch','English','Български','Typ']];
  topics.forEach(t=>{
    t.sentences.forEach(s=>rows.push([s.id,t.name,s.de,s.en||'',s.bg,s.origin]));
    for(let i=1;i<=EXTRA_LIMIT;i++)rows.push(['+'+i,t.name,'','','','teacher']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=(tid||'alle')+'.csv';a.click();toast('📊 CSV exportiert');
}

function handleCSV(){
  const f=document.getElementById('csv-file-inp').files[0];if(!f)return;
  requirePIN(()=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
        const hdr=lines[0].split(';').map(h=>h.replace(/^"|"$/g,'').toLowerCase().trim());
        const ci=n=>hdr.findIndex(h=>h.includes(n));
        const[iId,iThema,iDe,iEn,iBg,iTyp]=[ci('id'),ci('thema'),ci('deutsch'),ci('english'),ci('bulgar'),ci('typ')];
        let topics=getTopics(),upd=0,added=0;
        lines.slice(1).forEach(line=>{
          if(!line.trim())return;
          const c=line.split(';').map(x=>x.replace(/^"|"$/g,'').trim());
          const[id,thema,de,en,bg,typ]=[c[iId],c[iThema]||'',c[iDe]||'',c[iEn]||'',c[iBg]||'',(c[iTyp]||'').toLowerCase()];
          if(!de||!bg)return;
          if(id&&!id.startsWith('+')&&!isNaN(id)){topics=topics.map(t=>({...t,sentences:t.sentences.map(s=>s.id===Number(id)?{...s,de,en,bg}:s)}));upd++;}
          else if(typ==='teacher'&&de&&bg){
            const ti=topics.findIndex(t=>t.name===thema);if(ti<0)return;
            if(topics[ti].sentences.filter(s=>s.origin==='teacher').length>=EXTRA_LIMIT)return;
            const ns={id:nid(),de,en,bg,origin:'teacher'};
            topics[ti]={...topics[ti],sentences:[...topics[ti].sentences,ns]};
            A.deck[ns.id]=cardNew(ns.id);added++;
          }
        });
        saveTopics(topics);saveDeck();
        A.importRes={ok:true,upd,added};toast(`✅ ${upd} aktualisiert · ${added} hinzugefügt`);renderAdminImport();
      }catch(err){A.importRes={ok:false,err:String(err)};renderAdminImport();}
      document.getElementById('csv-file-inp').value='';
    };
    reader.readAsText(f,'utf-8');
  });
}

  loadDeck();loadAudio();loadStreak();

  const ni=document.getElementById('nb-profil-icon');if(ni)ni.textContent=p.emoji;
  badge();
  checkGifts();
  nav('home');
}
// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeGoodie();
    closePIN();
    closeEdit();
    if(document.getElementById('ob-overlay').classList.contains('open')&&OB.editId)obHide();
    if(document.getElementById('ps-overlay').classList.contains('open'))psHide();
  }
});
boot();

</script>
